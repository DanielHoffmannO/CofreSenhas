services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cofre_senhas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "${API_PORT:-5050}:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=cofre_senhas;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${FRONT_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  pgdata:
